name: Platform app test pipeline

env:
  include:
    - .env.test

tasks:
  default:
    desc: "Runs migrations, fmt, test"
    steps:
      - task: migrate
      - task: fmt
      - task: test

  migrate:
    desc: "Run migrations on projects"
    passthru: true
    steps:
      - atkins $HOME/.atkins/skills/schema.yml -w ./user migrate
      - atkins $HOME/.atkins/skills/schema.yml -w ./pulse migrate

  fmt:
    desc: "Source code formatting"
    steps:
      - goimports -w -local $(go list .) .
      - goimports-reviser -set-alias -format -imports-order "std,blanked,general,company,project" ./...
      - gofumpt -w .
      - go mod tidy

  test:
    desc: "Run go tests"
    tty: true
    passthru: true
    steps:
      - gotestsum ./... -- -count 1
      - go run ./internal/cmd/structurelint | tee docs/structurelint.md

  pre-commit:
    desc: "Pre-commit hook (fmt, test)"
    steps:
      - task: fmt
      - task: test
