# Main site navigation configuration
# Separate keys for header and footer - admin has its own config

# Header navigation - shown on all pages
header:
  - label: Articles
    url: /blog
    icon: file-text
  - label: RSS Feed
    url: /feed.xml
    icon: rss

# Footer navigation - login visible when logged out, admin visible when logged in
footer:
  - label: Articles
    url: /blog
    icon: file-text
  - label: RSS Feed
    url: /feed.xml
    icon: rss
  - label: Admin
    url: /admin
    icon: layout-dashboard
    loggedIn: true
  - label: Login
    url: /login
    icon: log-in
    loggedOut: true
